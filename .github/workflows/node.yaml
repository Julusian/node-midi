name: Build and publish

on:
  push:
    tags:
      - v*
    branches-ignore:
      - 'release-please-*'
  pull_request:
    paths-ignore:
      # ingore release-please prs
      - CHANGELOG.md
      - package.json
      - .release-please-manifest.json

env:
  NAPI_VERSION: 7
  BINDING_NAME: midi
  MACOSX_DEPLOYMENT_TARGET: '10.13'

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build ${{ matrix.docker-arch || matrix.arch }} on ${{ matrix.docker-image || matrix.container || matrix.os }} ${{ matrix.libc }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # windows
          - os: windows-2022
            arch: x64
            is-native: true
          - os: windows-2022
            arch: ia32
            is-native: false
          - os: windows-2022
            arch: arm64
            is-native: false
            node-version: 20.x # 18.x is missing the arm64 node.lib
          # macos
          - os: macos-latest
            arch: arm64
            is-native: true
          - os: macos-latest
            arch: x64
            is-native: false
          # linux
          - os: ubuntu-latest
            arch: x64
            is-native: true
            docker-arch: linux/amd64
            docker-image: node:20-bullseye
          # linux-libc
          - os: ubuntu-24.04-arm
            arch: arm64
            is-native: false
            docker-arch: linux/arm64
            docker-image: node:20-bullseye
          - os: ubuntu-24.04-arm
            arch: arm
            is-native: false
            docker-arch: linux/arm/v7
            docker-image: node:20-bullseye
          # linux-musl
          - os: ubuntu-latest
            arch: x64
            is-native: true
            docker-arch: linux/amd64
            docker-image: node:20-alpine
            libc: musl

    steps:
      - uses: actions/checkout@v7
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version || '20.x' }}

      - name: rebuild
        if: ${{ !matrix.docker-arch }}
        shell: bash
        run: |
          corepack enable

          yarn

          # if [ -n "${{ matrix.is-native }}" ]; then
          #   yarn test
          # fi

          yarn run rebuild --arch=${{ matrix.arch }}
          yarn pkg-prebuilds-copy --baseDir build/Release --source $BINDING_NAME.node --name=$BINDING_NAME --strip  --napi_version=$NAPI_VERSION --arch=${{ matrix.arch }}
        env:
          CI: true
          npm_config_build_from_source: true

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        if: ${{ matrix.docker-arch && env.dockerhub_username != '' }}
        env:
          dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        if: matrix.docker-arch
      - name: Pre-fetch image
        if: matrix.docker-arch
        run: docker pull ${{ matrix.docker-image }} --platform=${{ matrix.docker-arch }}
      - name: rebuild (in docker)
        uses: addnab/docker-run-action@v3
        if: matrix.docker-arch
        with:
          image: ${{ matrix.docker-image }}
          # shell: bash
          options: --platform=${{ matrix.docker-arch }} -v ${{ github.workspace }}:/work -e CI=1 -e npm_config_build_from_source=1 -e NAPI_VERSION -e BINDING_NAME
          run: |
            if command -v apt-get &> /dev/null
            then
              # # rewrite sources to archive mirrors
              # sed -i -E 's#https?://(deb|deb.debian).debian.org/debian#http://archive.debian.org/debian#g' /etc/apt/sources.list || true
              # sed -i -E 's#https?://security.debian.org#http://archive.debian.org/debian-security#g' /etc/apt/sources.list || true

              
              apt-get update
              apt-get install -y libasound2-dev
            elif command -v apk &> /dev/null
            then
              apk update
              apk add python3 make g++ gcc alsa-lib-dev
            fi

            cd /work

            corepack enable

            yarn
            # yarn test

            yarn pkg-prebuilds-copy --baseDir build/Release --source $BINDING_NAME.node --name=$BINDING_NAME --strip --napi_version=$NAPI_VERSION --arch=${{ matrix.arch }} --libc=${{ matrix.libc }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ runner.os }}-${{ matrix.arch }}-${{ matrix.libc }}-prebuilds
          path: prebuilds
          retention-days: 1

  test-nodejs:
    name: Test Node.JS ${{matrix.version}} on ${{ matrix.os }}
    needs: bundle
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        version: [14, 18, 20, 22, 24, 26]
        os: [
            ubuntu-latest,
            ubuntu-24.04-arm,
            windows-latest,
            windows-11-arm,
            macos-latest,
          ]
        exclude:
          - os: windows-11-arm
            version: 14
          - os: windows-11-arm
            version: 16
          - os: windows-11-arm
            version: 18
          - os: macos-latest
            version: 14

    steps:
      - uses: actions/checkout@v7
        with:
          submodules: 'recursive'
          fetch-depth: 0

      # The prebuilt addon links against libasound; the ALSA sequencer
      # (/dev/snd/seq) is needed for RtMidi to open (virtual) ports.
      - name: Enable ALSA (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          # The azure runner kernel ships no sound modules; the ALSA ones live
          # in the version-matched linux-modules-extra package.
          sudo apt-get install -y libasound2-dev "linux-modules-extra-$(uname -r)"
          sudo modprobe snd-seq-dummy   # pulls in snd-seq core -> creates /dev/snd/seq
          sudo modprobe snd-virmidi
          test -e /dev/snd/seq          # fail loudly if the module didn't load

      # Use the previously built prebuilds, so that the tests exercise what will be shipped.
      - name: Download prebuilds
        uses: actions/download-artifact@v7
        with:
          name: all-prebuilds
          path: prebuilds

      # Build the TypeScript with a modern Node.js.
      - name: Setup Node.js (build)
        uses: actions/setup-node@v6
        with:
          node-version: 20.x

      - name: Build package
        shell: bash
        run: |
          corepack enable

          # The native addon comes from the downloaded prebuild, so the install
          # lifecycle's pkg-prebuilds-verify passes and node-gyp never runs.
          yarn install

          # The runtime loader prefers build/ over prebuilds/, so make sure no
          # build/ exists - this guarantees the tests exercise the prebuild.
          rm -rf build

          yarn build:ts

      - name: Setup Node.js ${{ matrix.version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.version }}

      - name: Run tests
        shell: bash
        run: |
          # Don't use yarn, because of possible node version incompatibilities
          npm run test

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.x

      - name: Setup Environment
        shell: bash
        run: |
          corepack enable

          yarn install
        env:
          npm_config_build_from_source: true

      - name: Run lint
        shell: bash
        run: |
          yarn lint

  bundle:
    name: Bundle prebuilds
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: tmp

      - name: Display structure of downloaded files
        run: |
          mkdir prebuilds
          mv tmp/*/* prebuilds/

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: all-prebuilds
          path: prebuilds
          retention-days: 7

  publish:
    name: Publish to npm
    needs: bundle
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    # only run for tags
    if: contains(github.ref, 'refs/tags/')

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Checkout submodules
        shell: bash
        run: |
          auth_header="$(git config --local --get http.https://github.com/.extraheader)"
          git submodule sync --recursive
          git -c "http.extraheader=$auth_header" -c protocol.version=2 submodule update --init --force --recursive --depth=1

      - name: Use Node.js 24.x
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
      - name: Check release is desired
        id: do-publish
        run: |
          corepack enable

          PUBLISHED_VERSION=$(yarn npm info --json . | jq -c '.version' -r)
          THIS_VERSION=$(node -p "require('./package.json').version")
          # Simple bash helper to comapre version numbers
          verlte() {
            [  "$1" = "`echo -e "$1\n$2" | sort -V | head -n1`" ]
          }
          verlt() {
            [ "$1" = "$2" ] && return 1 || verlte $1 $2
          }
          if verlt $PUBLISHED_VERSION $THIS_VERSION
          then
            echo "Publishing latest"
            echo "tag=latest" >> $GITHUB_OUTPUT
          else
            echo "Publishing hotfix"
            echo "tag=hotfix" >> $GITHUB_OUTPUT
          fi

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev
      - name: Prepare build
        run: |
          corepack enable
          yarn install
        env:
          CI: true
      - uses: actions/download-artifact@v8
        with:
          name: all-prebuilds
          path: prebuilds
      - name: Publish to NPM
        run: |
          # Auth and provenance are handled automatically via OIDC trusted publishing
          npm publish --access=public --tag ${{ steps.do-publish.outputs.tag }}

          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "**Published:** $NEW_VERSION" >> $GITHUB_STEP_SUMMARY
        env:
          CI: true
