name: Build and publish

on:
  push:
    tags:
      - v*
    branches-ignore:
      - 'release-please-*'
  pull_request:
    paths-ignore:
      # ingore release-please prs
      - CHANGELOG.md
      - package.json
      - .release-please-manifest.json

env:
  NAPI_VERSION: 7
  BINDING_NAME: midi
  MACOSX_DEPLOYMENT_TARGET: '10.13'

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build ${{ matrix.docker-arch || matrix.arch }} on ${{ matrix.docker-image || matrix.container || matrix.os }} ${{ matrix.libc }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # windows
          - os: windows-2022
            arch: x64
            is-native: true
          - os: windows-2022
            arch: ia32
            is-native: false
          - os: windows-2022
            arch: arm64
            is-native: false
            node-version: 20.x # 18.x is missing the arm64 node.lib
          # macos
          - os: macos-latest
            arch: arm64
            is-native: true
          - os: macos-latest
            arch: x64
            is-native: false
          # linux
          - os: ubuntu-latest
            arch: x64
            is-native: true
            docker-arch: linux/amd64
            docker-image: node:20-bullseye
          # linux-libc
          - os: ubuntu-24.04-arm
            arch: arm64
            is-native: false
            docker-arch: linux/arm64
            docker-image: node:20-bullseye
          - os: ubuntu-24.04-arm
            arch: arm
            is-native: false
            docker-arch: linux/arm/v7
            docker-image: node:20-bullseye
          # linux-musl
          - os: ubuntu-latest
            arch: x64
            is-native: true
            docker-arch: linux/amd64
            docker-image: node:20-alpine
            libc: musl

    steps:
      - uses: actions/checkout@v7
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version || '20.x' }}

      - name: rebuild
        if: ${{ !matrix.docker-arch }}
        shell: bash
        run: |
          corepack enable

          yarn

          # if [ -n "${{ matrix.is-native }}" ]; then
          #   yarn test
          # fi

          yarn run rebuild --arch=${{ matrix.arch }}
          yarn pkg-prebuilds-copy --baseDir build/Release --source $BINDING_NAME.node --name=$BINDING_NAME --strip  --napi_version=$NAPI_VERSION --arch=${{ matrix.arch }}
        env:
          CI: true
          npm_config_build_from_source: true

      # For the docker (cross-arch) builds, install dependencies natively on the
      # amd64 host rather than inside the emulated container. The dependency tree
      # is arch-neutral JS/headers, and unpacking it under QEMU - especially the
      # 32-bit arm/v7 target - OOMs yarn. --mode=skip-build skips the native
      # compile here; the container below compiles for its architecture.
      - name: Install dependencies (host)
        if: matrix.docker-arch
        shell: bash
        run: |
          corepack enable
          yarn install --mode=skip-build

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        if: ${{ matrix.docker-arch && env.dockerhub_username != '' }}
        env:
          dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        if: matrix.docker-arch
      - name: Pre-fetch image
        if: matrix.docker-arch
        run: docker pull ${{ matrix.docker-image }} --platform=${{ matrix.docker-arch }}
      - name: rebuild (in docker)
        uses: addnab/docker-run-action@v3
        if: matrix.docker-arch
        with:
          image: ${{ matrix.docker-image }}
          # shell: bash
          options: >-
            --platform=${{ matrix.docker-arch }}
            -v ${{ github.workspace }}:/work
            -e CI=1
            -e npm_config_build_from_source=1
            -e NAPI_VERSION
            -e BINDING_NAME
          run: |
            if command -v apt-get &> /dev/null
            then
              # # rewrite sources to archive mirrors
              # sed -i -E 's#https?://(deb|deb.debian).debian.org/debian#http://archive.debian.org/debian#g' /etc/apt/sources.list || true
              # sed -i -E 's#https?://security.debian.org#http://archive.debian.org/debian-security#g' /etc/apt/sources.list || true

              
              apt-get update
              apt-get install -y libasound2-dev
            elif command -v apk &> /dev/null
            then
              apk update
              apk add python3 make g++ gcc alsa-lib-dev
            fi

            cd /work

            # node_modules was installed on the host and mounted in; only compile
            # the addon for this architecture (the container's node is this arch).
            node_modules/.bin/node-gyp rebuild

            node_modules/.bin/pkg-prebuilds-copy --baseDir build/Release --source $BINDING_NAME.node --name=$BINDING_NAME --strip --napi_version=$NAPI_VERSION --arch=${{ matrix.arch }} --libc=${{ matrix.libc }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ runner.os }}-${{ matrix.arch }}-${{ matrix.libc }}-prebuilds
          path: prebuilds
          retention-days: 1

  test-nodejs:
    name: Test Node.JS ${{matrix.version}} on ${{ matrix.os }}
    needs: bundle
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        version: [14, 18, 20, 22, 24, 26]
        os: [
            ubuntu-latest,
            ubuntu-24.04-arm,
            windows-latest,
            windows-11-arm,
            macos-latest,
          ]
        exclude:
          - os: windows-11-arm
            version: 14
          - os: windows-11-arm
            version: 16
          - os: windows-11-arm
            version: 18
          - os: macos-latest
            version: 14

    steps:
      - uses: actions/checkout@v7
        with:
          submodules: 'recursive'
          fetch-depth: 0

      # The prebuilt addon links against libasound (libasound.so.2), so the
      # runtime library must be present for the module to even load.
      # Note: hosted Linux runners use an Azure cloud kernel built without ALSA
      # (no snd modules at all), so /dev/snd/seq never exists and RtMidi cannot
      # open ports here - hence the Linux job only smoke-tests that the addon
      # loads (see "Run tests" below).
      - name: Install ALSA runtime (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev

      # Use the previously built prebuilds, so that the tests exercise what will be shipped.
      - name: Download prebuilds
        uses: actions/download-artifact@v7
        with:
          name: all-prebuilds
          path: prebuilds

      # Build the TypeScript with a modern Node.js.
      - name: Setup Node.js (build)
        uses: actions/setup-node@v6
        with:
          node-version: 20.x

      - name: Build package
        shell: bash
        run: |
          corepack enable

          # The native addon comes from the downloaded prebuild, so the install
          # lifecycle's pkg-prebuilds-verify passes and node-gyp never runs.
          yarn install

          # The runtime loader prefers build/ over prebuilds/, so make sure no
          # build/ exists - this guarantees the tests exercise the prebuild.
          rm -rf build

          yarn build:ts

      - name: Setup Node.js ${{ matrix.version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.version }}

      # Linux runners have no ALSA sequencer, so only assert the addon loads.
      - name: Run tests (smoke, Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: npm run test:smoke

      - name: Run tests
        if: runner.os != 'Linux'
        shell: bash
        run: |
          # Don't use yarn, because of possible node version incompatibilities
          npm run test

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.x

      - name: Setup Environment
        shell: bash
        run: |
          corepack enable

          yarn install
        env:
          npm_config_build_from_source: true

      - name: Run lint
        shell: bash
        run: |
          yarn lint

  bundle:
    name: Bundle prebuilds
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: tmp

      - name: Display structure of downloaded files
        run: |
          mkdir prebuilds
          mv tmp/*/* prebuilds/

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: all-prebuilds
          path: prebuilds
          retention-days: 7

  publish:
    name: Publish to npm
    needs: bundle
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    # only run for tags
    if: contains(github.ref, 'refs/tags/')

    steps:
      - uses: actions/checkout@v7
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Use Node.js 24.x
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
      - name: Check release is desired
        id: do-publish
        run: |
          corepack enable

          PUBLISHED_VERSION=$(yarn npm info --json . | jq -c '.version' -r)
          THIS_VERSION=$(node -p "require('./package.json').version")
          # Simple bash helper to comapre version numbers
          verlte() {
            [  "$1" = "`echo -e "$1\n$2" | sort -V | head -n1`" ]
          }
          verlt() {
            [ "$1" = "$2" ] && return 1 || verlte $1 $2
          }
          if verlt $PUBLISHED_VERSION $THIS_VERSION
          then
            echo "Publishing latest"
            echo "tag=latest" >> $GITHUB_OUTPUT
          else
            echo "Publishing hotfix"
            echo "tag=hotfix" >> $GITHUB_OUTPUT
          fi

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev
      - name: Prepare build
        run: |
          corepack enable
          yarn install
        env:
          CI: true
      - uses: actions/download-artifact@v8
        with:
          name: all-prebuilds
          path: prebuilds
      - name: Publish to NPM
        run: |
          # Auth and provenance are handled automatically via OIDC trusted publishing
          npm publish --access=public --tag ${{ steps.do-publish.outputs.tag }}

          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "**Published:** $NEW_VERSION" >> $GITHUB_STEP_SUMMARY
        env:
          CI: true
